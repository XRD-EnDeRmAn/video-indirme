<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video & MP3 Downloader - Hızlı ve Güvenli İndir</title>
    <meta name="description" content="YouTube videolarını saniyeler içinde yüksek kaliteli MP3 ses veya MP4 video formatında ücretsiz indirin. Üye olmaya gerek yoktur.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-section">
        <h1>YouTube Video Downloader</h1>
        <p class="subtitle">Convert and download YouTube videos in MP3 or MP4 format for free.</p>
    </div>
    
    <div class="main-container">
        <!-- Downloader Card -->
        <div class="downloader-card" id="downloader-card">
            <label for="url-input" class="input-label">Paste your YouTube link</label>
            <div class="input-container">
                <input type="text" id="url-input" placeholder="youtube.com/watch?v=Y2MaTeR0cKs" autocomplete="off" spellcheck="false">
            </div>
            
            <div class="controls-row">
                <div class="format-selector">
                    <button type="button" class="format-btn active" id="btn-mp3" data-format="mp3">MP3</button>
                    <button type="button" class="format-btn" id="btn-mp4" data-format="mp4">MP4</button>
                </div>
                
                <div class="quality-selector-container" id="quality-container" style="display: none;">
                    <select id="quality-select" class="quality-select">
                        <option value="720">720p (HD)</option>
                        <option value="480">480p</option>
                        <option value="360">360p</option>
                    </select>
                </div>
                
                <button type="button" class="convert-btn" id="convert-btn">
                    <span class="btn-text">Convert</span>
                    <div class="spinner" id="btn-spinner"></div>
                </button>
            </div>
        </div>

        <!-- Video Info Card -->
        <div class="video-info-card" id="video-info-card">
            <div class="thumbnail-wrapper">
                <img id="video-thumbnail" src="" alt="Video Thumbnail">
            </div>
            <div class="info-details">
                <h3 id="video-title">Video Title</h3>
                <p id="video-author">Channel Name</p>
                <div class="progress-container" id="progress-container">
                    <div class="progress-bar-wrapper">
                        <div class="progress-bar" id="progress-bar"></div>
                    </div>
                    <span class="progress-status" id="progress-status">İşleniyor...</span>
                </div>
                <a href="#" id="download-link" class="download-link-btn" download>
                    Hemen İndir
                </a>
            </div>
        </div>

        <!-- Feedback Alert Messages -->
        <div class="status-message error-message" id="error-box">
            <span class="message-text" id="error-text">Bir hata oluştu!</span>
        </div>
    </div>

    <footer>
        <p>© 2026 YouTube Downloader. Mod made by @LeftEr4Dead. Tüm hakları saklıdır.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
